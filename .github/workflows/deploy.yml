name: Deploy IdleFactory

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VPS_HOST: ${{ secrets.VPS_HOST || vars.VPS_HOST }}
      VPS_USER: ${{ secrets.VPS_USER || vars.VPS_USER }}
      VPS_PORT: ${{ secrets.VPS_PORT || vars.VPS_PORT }}
      VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY || vars.VPS_SSH_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Build
        run: npm run build

      - name: Validate secrets
        run: |
          [ -n "$VPS_HOST" ] || (echo "Missing VPS_HOST (secret or variable)" && exit 1)
          [ -n "$VPS_USER" ] || (echo "Missing VPS_USER (secret or variable)" && exit 1)
          [ -n "$VPS_PORT" ] || (echo "Missing VPS_PORT (secret or variable)" && exit 1)
          [ -n "$VPS_SSH_KEY" ] || (echo "Missing VPS_SSH_KEY (secret or variable)" && exit 1)
      - name: Copy dist to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.VPS_HOST }}
          username: ${{ env.VPS_USER }}
          key: ${{ env.VPS_SSH_KEY }}
          port: ${{ env.VPS_PORT }}
          source: "dist/*"
          target: /var/www/idlefactory
          strip_components: 1

      - name: Reload nginx
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ env.VPS_HOST }}
          username: ${{ env.VPS_USER }}
          key: ${{ env.VPS_SSH_KEY }}
          port: ${{ env.VPS_PORT }}
          script: |
            sudo chmod -R a+rX /var/www/idlefactory
            sudo systemctl reload nginx

      - name: Smoke check live site
        run: |
          for i in 1 2 3 4 5; do
            code=$(curl -sS -o /dev/null -w "%{http_code}" https://factory.brucksteg.eu || true)
            if [ "$code" = "200" ]; then
              echo "Smoke check passed (HTTP 200)."
              exit 0
            fi
            echo "Attempt $i failed (HTTP $code). Retrying..."
            sleep 3
          done
          echo "Smoke check failed after retries."
          exit 1
